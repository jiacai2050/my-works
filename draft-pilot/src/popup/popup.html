<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --color-bg: #f6f8fa;
        --color-card: #ffffff;
        --color-section: #f6f8fa;
        --color-input: #ffffff;
        --color-border: #d0d7de;
        --color-text: #24292f;
        --color-muted: #656d76;
        --color-accent: #1f6feb;
        --color-accent-hover: #1a5edb;
        --color-success: #1a7f37;
        --color-focus: rgba(31, 111, 235, 0.16);
        --color-hover: #f6f8fa;
        --shadow-card: 0 16px 40px rgba(31, 35, 40, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0d1117;
          --color-card: #161b22;
          --color-section: #0d1117;
          --color-input: #0d1117;
          --color-border: #30363d;
          --color-text: #f0f6fc;
          --color-muted: #8b949e;
          --color-accent: #2f81f7;
          --color-accent-hover: #1f6feb;
          --color-success: #3fb950;
          --color-focus: rgba(47, 129, 247, 0.24);
          --color-hover: #21262d;
          --shadow-card: 0 16px 40px rgba(1, 4, 9, 0.4);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 0;
        min-height: 100vh;
        margin: 0;
        padding: 48px 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: var(--color-text);
        background:
          radial-gradient(
            circle at top left,
            rgba(31, 111, 235, 0.1),
            transparent 32rem
          ),
          var(--color-bg);
      }

      .page {
        width: min(100%, 720px);
        margin: 0 auto;
      }

      .header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0;
        color: var(--color-muted);
        font-size: 14px;
      }

      .card {
        padding: 28px;
        border: 1px solid var(--color-border);
        border-radius: 16px;
        background: var(--color-card);
        box-shadow: var(--shadow-card);
      }

      .settings-section {
        padding: 20px;
        margin-bottom: 18px;
        border: 1px solid var(--color-border);
        border-radius: 12px;
        background: var(--color-section);
      }

      .settings-section:last-of-type {
        margin-bottom: 0;
      }

      .section-header {
        margin: -2px 0 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--color-border);
      }

      .section-header h2 {
        margin: 0 0 4px;
        font-size: 16px;
        line-height: 1.3;
      }

      .section-header p {
        margin: 0;
        color: var(--color-muted);
        font-size: 13px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .hint {
        font-weight: 400;
        color: var(--color-muted);
        font-size: 12px;
      }

      select,
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        font: inherit;
        color: var(--color-text);
        background: var(--color-input);
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      select:focus,
      input:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px var(--color-focus);
      }

      .key-wrap {
        position: relative;
      }

      .key-wrap input {
        padding-right: 44px;
      }

      .key-wrap button {
        position: absolute;
        right: 6px;
        top: 50%;
        width: 32px;
        height: 32px;
        transform: translateY(-50%);
        border: none;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        font-size: 15px;
      }

      .key-wrap button:hover {
        background: var(--color-hover);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 24px;
      }

      .save-btn {
        min-width: 140px;
        padding: 10px 18px;
        background: var(--color-accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .save-btn:hover {
        background: var(--color-accent-hover);
      }

      .status {
        min-height: 21px;
        font-size: 13px;
        color: var(--color-success);
      }

      .shortcut {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 13px;
        color: var(--color-muted);
      }

      .shortcut-copy {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .shortcut-keys {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .shortcut-help {
        width: 100%;
        color: var(--color-muted);
        font-size: 12px;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 16px;
        padding: 10px 14px;
        border: 1px solid var(--color-border);
        border-radius: 999px;
        background: color-mix(in srgb, var(--color-card) 72%, transparent);
        color: var(--color-muted);
        font-size: 12px;
        text-align: center;
      }

      .footer a {
        color: var(--color-muted);
        font-weight: 500;
        text-decoration: none;
      }

      .footer a:hover {
        color: var(--color-accent);
      }

      kbd {
        display: inline-block;
        min-width: 22px;
        padding: 2px 6px;
        background: var(--color-hover);
        border: 1px solid var(--color-border);
        border-bottom-color: var(--color-muted);
        border-radius: 5px;
        color: var(--color-text);
        font-size: 12px;
        text-align: center;
        box-shadow: inset 0 -1px 0 var(--color-muted);
      }

      @media (max-width: 560px) {
        body {
          padding: 28px 16px;
        }

        h1 {
          font-size: 24px;
        }

        .card {
          padding: 20px;
        }

        .settings-section {
          padding: 16px;
        }

        .actions {
          display: block;
        }

        .save-btn {
          width: 100%;
        }

        .status {
          margin-top: 10px;
          text-align: center;
        }

        .footer {
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 data-i18n="settingsTitle"></h1>
        <p class="subtitle" data-i18n="extDescription"></p>
      </header>

      <section class="card">
        <section class="settings-section">
          <div class="section-header">
            <h2 data-i18n="sectionProvider"></h2>
            <p data-i18n="sectionProviderDesc"></p>
          </div>

          <div class="field">
            <label data-i18n="labelBaseUrl"></label>
            <input
              id="baseUrl"
              type="text"
              data-i18n-placeholder="baseUrlPlaceholder"
            />
          </div>

          <div class="field">
            <label data-i18n="labelApiKey"></label>
            <div class="key-wrap">
              <input id="apiKey" type="password" placeholder="sk-..." />
              <button id="toggleKey" type="button">👁</button>
            </div>
          </div>

          <div class="field">
            <label data-i18n="labelModel"></label>
            <input
              id="model"
              type="text"
              data-i18n-placeholder="modelPlaceholder"
            />
          </div>

          <div class="field">
            <label data-i18n="labelTone"></label>
            <select id="tone">
              <option value="" data-i18n="toneNeutral"></option>
              <option value="formal" data-i18n="toneFormalOption"></option>
              <option value="friendly" data-i18n="toneFriendlyOption"></option>
              <option value="concise" data-i18n="toneConciseOption"></option>
            </select>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-header">
            <h2 data-i18n="sectionGitHub"></h2>
            <p data-i18n="sectionGitHubDesc"></p>
          </div>

          <div class="field">
            <label>
              <span data-i18n="labelGhToken"></span>
              <span class="hint" data-i18n="ghTokenHint"></span>
            </label>
            <div class="key-wrap">
              <input
                id="ghToken"
                type="password"
                data-i18n-placeholder="ghTokenPlaceholder"
              />
              <button id="toggleGhToken" type="button">👁</button>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="section-header">
            <h2 data-i18n="sectionUsage"></h2>
            <p data-i18n="sectionUsageDesc"></p>
          </div>

          <div class="shortcut">
            <span class="shortcut-copy">
              <span data-i18n="shortcutHint"></span>
              <span class="shortcut-keys">
                <kbd>⌘</kbd><span>+</span><kbd>⇧</kbd><span>+</span><kbd>E</kbd>
              </span>
            </span>
            <span class="shortcut-help">
              <span data-i18n="shortcutManageHint"></span>
              <span>(chrome://extensions/shortcuts)</span>
            </span>
          </div>
        </section>

        <div class="actions">
          <button class="save-btn" id="save" data-i18n="saveBtn"></button>
          <div class="status" id="status"></div>
        </div>
      </section>

      <footer class="footer">
        <a
          href="https://jiacai2050.github.io/my-works/draft-pilot/"
          target="_blank"
          rel="noreferrer"
          data-i18n="footerProjectHome"
        ></a>
        <span>·</span>
        <a
          href="https://github.com/jiacai2050/my-works/tree/main/draft-pilot"
          target="_blank"
          rel="noreferrer"
          data-i18n="footerGitHub"
        ></a>
        <span>·</span>
        <span
          ><span data-i18n="footerVersion"></span> <span id="version"></span
        ></span>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
