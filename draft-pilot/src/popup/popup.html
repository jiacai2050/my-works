<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #24292f;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      select,
      input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        font-size: 13px;
        box-sizing: border-box;
        margin-bottom: 12px;
      }
      .key-wrap {
        position: relative;
      }
      .key-wrap input {
        padding-right: 36px;
      }
      .key-wrap button {
        position: absolute;
        right: 4px;
        top: 4px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
      }
      .save-btn {
        width: 100%;
        padding: 8px;
        background: #1f6feb;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      .save-btn:hover {
        opacity: 0.9;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #1a7f37;
        text-align: center;
      }
      .shortcut {
        margin-top: 12px;
        font-size: 12px;
        color: #656d76;
        text-align: center;
      }
      kbd {
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="settingsTitle"></h1>

    <label data-i18n="labelProvider"></label>
    <select id="provider">
      <option value="openai">OpenAI Compatible</option>
      <option value="anthropic">Anthropic (Claude)</option>
    </select>

    <label data-i18n="labelBaseUrl"></label>
    <input
      id="baseUrl"
      type="text"
      data-i18n-placeholder="baseUrlPlaceholder"
    />

    <label data-i18n="labelApiKey"></label>
    <div class="key-wrap">
      <input id="apiKey" type="password" placeholder="sk-..." />
      <button id="toggleKey" type="button">👁</button>
    </div>

    <label data-i18n="labelModel"></label>
    <input id="model" type="text" data-i18n-placeholder="modelPlaceholder" />

    <label data-i18n="labelTone"></label>
    <select id="tone">
      <option value="" data-i18n="toneNeutral"></option>
      <option value="formal" data-i18n="toneFormalOption"></option>
      <option value="friendly" data-i18n="toneFriendlyOption"></option>
      <option value="concise" data-i18n="toneConciseOption"></option>
    </select>

    <label
      ><span data-i18n="labelGhToken"></span>
      <span
        style="font-weight: normal; color: #656d76"
        data-i18n="ghTokenHint"
      ></span
    ></label>
    <input
      id="ghToken"
      type="password"
      data-i18n-placeholder="ghTokenPlaceholder"
    />

    <button class="save-btn" id="save" data-i18n="saveBtn"></button>
    <div class="status" id="status"></div>
    <div class="shortcut">
      <span data-i18n="shortcutHint"></span> <kbd>⌘</kbd> + <kbd>⇧</kbd> +
      <kbd>E</kbd>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
